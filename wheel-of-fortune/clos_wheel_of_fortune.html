<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOS // Wheel of Fortune</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #0A0A0A; color: #F5F5F7; font-family: 'Inter', sans-serif; }
  .bc { font-family: 'Barlow Condensed', sans-serif; }

  /* SETUP + RESULTS — scrollable, padded */
  .page-setup, .page-results {
    max-width: 1100px; margin: 0 auto; padding: 24px;
  }

  /* SHOW PHASE — full viewport, no scroll */
  .page-show {
    width: 100vw; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .show-header {
    padding: 20px 40px 12px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #1A1A1A; flex-shrink: 0;
  }
  .show-body {
    flex: 1; display: flex; overflow: hidden;
  }
  .show-main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    padding: 32px 48px;
  }
  .show-sidebar {
    width: 300px; border-left: 1px solid #1A1A1A;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px 20px; border-bottom: 1px solid #1A1A1A; flex-shrink: 0;
  }
  .sidebar-list {
    flex: 1; overflow-y: auto; padding: 12px;
  }

  /* ROUND TRANSITION — full viewport centered */
  .page-transition {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 28px;
  }

  input, select {
    background: #111; border: 1px solid #2A2A2A; border-radius: 6px;
    padding: 9px 13px; color: #F5F5F7; font-family: 'Inter', sans-serif;
    font-size: 13px; width: 100%; outline: none;
  }
  input:focus, select:focus { border-color: #A8B2BB; }
  button { cursor: pointer; border: none; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 2px; transition: opacity 0.15s, transform 0.1s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 3px; font-family: 'Inter', sans-serif; min-width: 44px; text-align: center; display: inline-block; }
  .remove-btn { background: none; border: none; color: #444; font-size: 16px; padding: 0 4px; cursor: pointer; letter-spacing: 0; }
  .remove-btn:hover { color: #888; }
  .scroll-list { max-height: 320px; overflow-y: auto; }
  .scroll-list::-webkit-scrollbar,
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .scroll-list::-webkit-scrollbar-track,
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .scroll-list::-webkit-scrollbar-thumb,
  .sidebar-list::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 2px; }

  /* Animations */
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  .slot-spinning { animation: pulse 0.3s infinite; }
  .slot-settled { animation: none; }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes cardFadeIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes cardFlipIn {
    0%   { transform: perspective(1000px) rotateY(-90deg); opacity: 0; }
    35%  { opacity: 1; }
    100% { transform: perspective(1000px) rotateY(0deg);   opacity: 1; }
  }
  .coach-card-reveal { animation: cardFlipIn 1.1s cubic-bezier(0.25,0.8,0.25,1) forwards; }
  .coach-card-static { opacity: 1; }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }

  /* ─── Extracted component classes ─────────────────────────────────────────── */

  /* Spacebar / keyboard hint text */
  .spacebar-hint { font-size: 12px; color: #333; text-align: center; margin-top: 8px; }

  /* Coach card in show phase */
  .coach-card {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    text-align: center; background: #111; border: 1px solid #1A1A1A;
    border-radius: 20px; padding: 32px 56px; min-width: 420px;
  }
  .coach-name-hero {
    font-size: clamp(52px,9vw,120px); font-weight: 900; color: #F5F5F7;
    line-height: 1; letter-spacing: 1px;
  }
  .coach-stats { font-size: clamp(12px,1.2vw,15px); color: #666; }
  .tier-pill {
    font-weight: 700; letter-spacing: 5px; padding: 5px 24px;
    border-radius: 4px; font-size: clamp(11px,1.2vw,15px);
  }

  /* Sidebar assignment entries */
  .sidebar-entry {
    background: #1A1A1A; padding: 7px 11px; border-radius: 0 4px 4px 0;
    font-size: 12px; margin-bottom: 3px;
  }
  .sidebar-entry-name { font-weight: 700; color: #F5F5F7; font-size: 13px; }
  .sidebar-entry-school { color: #888; }
  .sidebar-tier-label {
    font-size: 10px; font-weight: 700; color: #333; letter-spacing: 2px;
    padding: 4px 0; margin-bottom: 4px; border-bottom: 1px solid #1A1A1A;
  }

  /* Tiebreaker panel */
  .tb-divider { height: 1px; flex: 1; background: #2A2A2A; }
  .tb-title {
    font-size: clamp(14px,1.6vw,20px); font-weight: 700;
    color: #C9A84C; letter-spacing: 4px;
  }
  .tb-school-name {
    font-size: clamp(28px,4vw,52px); font-weight: 900;
    color: #F5F5F7; margin-bottom: 20px;
  }
  .tb-slot-box {
    background: #111; border: 3px solid #2A2A2A; border-radius: 12px;
    padding: 32px 60px; text-align: center; display: inline-block; min-width: 340px;
  }
  .tb-slot-val {
    font-size: clamp(32px,5vw,64px); font-weight: 900; color: #F5F5F7;
    text-transform: uppercase; line-height: 1.1;
  }
  .tb-result-box {
    background: #0A0A0A; border-radius: 10px; padding: 20px;
    margin-bottom: 16px; text-align: center;
  }
  .tb-reason { color: #555; font-weight: 700; letter-spacing: 2px; font-size: 11px; margin-bottom: 8px; }
  .tb-detail { color: #888; font-size: clamp(12px,1.2vw,14px); margin-bottom: 12px; }
  .tb-winner {
    font-size: clamp(24px,3.5vw,44px); font-weight: 900;
    color: #C9A84C; letter-spacing: 2px;
  }

  /* Empty pool card */
  .empty-pool-card {
    background: #1A1A1A; border: 2px solid #2A2A2A; border-radius: 16px;
    padding: 36px 48px; text-align: center; max-width: 480px; width: 100%;
  }
  .empty-pool-title {
    font-size: clamp(18px,2.5vw,28px); font-weight: 700;
    color: #555; letter-spacing: 3px; margin-bottom: 8px;
  }
  .empty-pool-sub { font-size: 13px; color: #333; margin-bottom: 28px; }

  /* Buttons — action variants */
  .btn-spin {
    font-size: clamp(20px,2.5vw,32px); padding: 22px 72px; letter-spacing: 4px;
  }
  .btn-next {
    font-size: clamp(18px,2.2vw,28px); padding: 20px 56px; letter-spacing: 3px;
  }
  .btn-undo {
    background: transparent; border: 1px solid #2A2A2A; color: #666;
    font-size: clamp(13px,1.4vw,16px); padding: 14px 24px; letter-spacing: 1px;
  }
  .btn-confirm-tb {
    background: #C9A84C; color: #0A0A0A; width: 100%; padding: 16px;
    font-size: clamp(16px,1.8vw,22px); letter-spacing: 3px;
  }
  .btn-row { display: flex; gap: 16px; justify-content: center; align-items: center; }

  /* Round transition */
  .transition-logo {
    position: absolute; top: 20px; left: 40px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 20px;
    font-weight: 700; color: #2A2A2A; letter-spacing: 3px;
  }
  .transition-tier {
    font-size: clamp(72px,14vw,160px); font-weight: 900;
    color: #F5F5F7; line-height: 0.9; letter-spacing: 2px;
  }
  .transition-coming-up {
    font-size: 16px; font-weight: 700; letter-spacing: 6px;
    padding: 8px 32px; border-radius: 4px;
  }
  .transition-coach-name {
    font-size: clamp(14px,1.6vw,20px); font-weight: 700;
    color: #555; letter-spacing: 1px;
  }
  .transition-diamond { color: #333; margin: 0 12px; font-size: 14px; }

  /* UNDONE flash overlay */
  .undone-flash {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #E00122; color: #F5F5F7; font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(32px,5vw,56px); font-weight: 900; letter-spacing: 4px;
    padding: 20px 48px; border-radius: 8px; z-index: 1000;
    opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
  }

  /* Show header elements */
  .show-logo {
    font-size: clamp(20px,2.5vw,32px); font-weight: 900;
    color: #C9A84C; letter-spacing: 3px;
  }
  .show-tier-badge {
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    padding: 4px 16px; border-radius: 3px;
  }
  .show-spin-count { font-size: 13px; color: #555; }
  .mute-btn {
    background: transparent; border: 1px solid #2A2A2A;
    font-size: 18px; padding: 4px 10px; letter-spacing: 0;
    line-height: 1; border-radius: 4px;
  }
  .progress-track { height: 2px; background: #1A1A1A; flex-shrink: 0; }
  .progress-fill { height: 100%; background: #C9A84C; transition: width 0.6s ease; }

  /* Page titles */
  .page-title {
    font-size: 48px; font-weight: 900; color: #C9A84C;
    letter-spacing: 2px; line-height: 1;
  }
  .page-subtitle {
    font-size: 22px; font-weight: 700; color: #A8B2BB;
    letter-spacing: 4px; margin-top: 4px;
  }

  /* Setup page components */
  .setup-section {
    background: #0D1B2A; border-radius: 10px; padding: 20px; margin-bottom: 28px;
  }
  .setup-section-title {
    font-size: 17px; font-weight: 700; color: #C9A84C; letter-spacing: 2px;
  }
  .setup-coach-item {
    display: flex; justify-content: space-between; align-items: center;
    background: #1A1A1A; border-radius: 0 6px 6px 0;
    padding: 10px 14px; margin-bottom: 5px;
  }
  .setup-occ-item {
    display: flex; justify-content: space-between; align-items: center;
    background: #1A1A1A; border-radius: 6px;
    padding: 7px 12px; margin-bottom: 4px; font-size: 13px;
  }
  .setup-form {
    background: #1A1A1A; border-radius: 10px; padding: 18px;
    margin-top: 8px; display: flex; flex-direction: column; gap: 8px;
  }
  .setup-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .setup-empty { color: #444; font-size: 13px; font-style: italic; }
  .setup-count { font-size: 11px; color: #555; }
  .setup-occ-hint { font-size: 11px; color: #444; margin-bottom: 8px; }

  /* Results page */
  .result-card {
    background: #1A1A1A; border-radius: 10px; overflow: hidden;
  }
  .result-card-header { background: #0D1B2A; padding: 12px 16px; }
  .result-card-name { font-size: 19px; font-weight: 700; color: #F5F5F7; }
  .result-card-meta { font-size: 11px; color: #A8B2BB; margin-top: 2px; }
  .result-top-offer {
    padding: 14px 16px; border-bottom: 1px solid #111; transition: background 0.3s;
  }
  .result-top-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
  .result-top-school { font-size: 28px; font-weight: 900; }
  .result-top-tier { font-size: 11px; margin-top: 2px; }
  .result-other-row { display: flex; align-items: center; padding: 6px 14px; border-bottom: 1px solid #111; }
  .result-other-label { font-size: 10px; font-weight: 700; color: #333; letter-spacing: 2px; padding: 0 14px; margin-bottom: 4px; }

  /* Injected slot elements */
  .slot-box {
    background: #1A1A1A; border: 4px solid #2A2A2A; border-radius: 16px;
    padding: 48px 80px; text-align: center; min-width: 420px;
    transition: background 0.35s, border-color 0.35s;
  }
  .slot-val {
    font-size: clamp(48px,7vw,96px); font-weight: 900; color: #F5F5F7;
    text-transform: uppercase; line-height: 1.1; transition: all 0.3s;
  }
  .slot-wrapper {
    overflow: hidden; max-height: 0; opacity: 0;
    transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
  }
  .countdown-bar {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 100%; max-width: 520px; opacity: 0; transition: opacity 0.4s ease;
  }
  .countdown-track {
    width: 100%; height: 2px; background: #1A1A1A;
    border-radius: 1px; overflow: hidden;
  }
  .countdown-fill { height: 100%; width: 0%; border-radius: 1px; transition: width 3.5s linear; }

  /* Next/undo button container */
  .injected-btn-wrap {
    opacity: 0; transition: opacity 0.8s ease; text-align: center;
    margin-top: 36px; display: flex; flex-direction: column;
    gap: 12px; align-items: center;
  }

  /* Tiebreaker injected result panel */
  .tb-injected-result {
    opacity: 0; transition: opacity 0.7s ease;
    width: 100%; max-width: 500px; margin-top: 20px;
  }

  /* Fetch status messages */
  .fetch-msg { margin-top: 10px; font-size: 12px; }
  .fetch-success { color: #4CAF50; font-weight: 700; }
  .fetch-error { color: #E24B4A; }
  .fetch-loading { color: #A8B2BB; }

  /* Form validation */
  .form-error { color: #E24B4A; font-size: 12px; padding: 2px 0; }
  .form-warn { color: #C9A84C; font-size: 12px; padding: 2px 0; }

  /* Sidebar now-spinning indicator */
  .sidebar-now-spinning {
    padding: 10px 14px; margin-bottom: 8px;
    background: #111; border: 1px solid #2A2A2A; border-radius: 6px;
    font-size: 11px; color: #555; letter-spacing: 1px; text-transform: uppercase;
  }
  .sidebar-now-spinning-name {
    font-size: 15px; font-weight: 700; color: #F5F5F7;
    letter-spacing: 0; text-transform: none; margin-top: 2px;
  }
  @keyframes spinPulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
  .sidebar-now-spinning.is-active .sidebar-spinning-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #C9A84C; margin-right: 6px; vertical-align: middle;
    animation: spinPulse 1.2s ease infinite;
  }

  /* Pause overlay */
  .pause-overlay {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .pause-label {
    font-size: clamp(64px,12vw,140px); font-weight: 900;
    color: #F5F5F7; letter-spacing: 8px; opacity: 0.7;
  }
  .pause-hint { font-size: 14px; color: #555; margin-top: 12px; letter-spacing: 2px; }
  .btn-pause {
    background: transparent; border: 1px solid #2A2A2A;
    font-size: 14px; padding: 4px 10px; letter-spacing: 0;
    line-height: 1; border-radius: 4px; color: #555;
  }
  .btn-pause:hover { color: #A8B2BB; border-color: #444; }

  /* Progress bar pulse on increment */
  @keyframes progressGlow {
    0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.6); }
    50% { box-shadow: 0 0 8px 2px rgba(201,168,76,0.4); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  }
  .progress-fill-pulse { animation: progressGlow 0.8s ease-out; }

  /* Spacebar hints — barely visible to audience, streamer knows the keys */
  .spacebar-hint {
    opacity: 0.35; transition: opacity 0.3s ease;
  }
  .spacebar-hint:hover { opacity: 1; }

  /* Setup page — cinematic upgrade */
  .setup-hero {
    text-align: center; margin-bottom: 36px; padding: 40px 24px 32px;
    background: linear-gradient(180deg, #0D1B2A 0%, #0A0A0A 100%);
    border-radius: 16px; border: 1px solid #1A1A1A;
    position: relative; overflow: hidden;
  }
  .setup-hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .setup-columns { display: flex; gap: 28px; flex-wrap: wrap; }
  .setup-col-main { flex: 1; min-width: 280px; }
  .setup-col-side { width: 240px; }
  .setup-section {
    background: linear-gradient(135deg, #0D1B2A 0%, #111827 100%);
    border: 1px solid #1A2A3A;
  }
  .setup-section:hover { border-color: #2A3A4A; }
  .setup-coach-item {
    transition: background 0.2s ease;
  }
  .setup-coach-item:hover { background: #222; }
  .setup-start-area {
    text-align: center; margin-top: 44px; padding-bottom: 20px;
  }
  .btn-start-show {
    background: linear-gradient(135deg, #C9A84C 0%, #A8872E 100%);
    color: #0A0A0A; font-size: 22px; padding: 18px 56px; letter-spacing: 4px;
    border: none; position: relative; overflow: hidden;
    box-shadow: 0 0 24px rgba(201,168,76,0.15);
    transition: box-shadow 0.3s ease, transform 0.1s ease;
  }
  .btn-start-show:hover { box-shadow: 0 0 36px rgba(201,168,76,0.3); }
  .setup-section-header {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;
  }
  .setup-section-label {
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
  }

  /* School color takeover on coach card after reveal */
  .coach-card {
    position: relative; overflow: hidden;
  }
  .coach-card-accented {
    transition: border-color 0.7s ease, box-shadow 0.9s ease;
  }

  /* Color wave sweep — left-to-right wash matching the slot box sweep */
  .school-wave {
    position: absolute; inset: 0; border-radius: 20px;
    pointer-events: none; opacity: 0;
    background-size: 200% 100%; background-position: 100% 0;
    transition: opacity 0.3s ease, background-position 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  .school-wave.sweep {
    opacity: 1;
    background-position: 0% 0;
  }

  /* Accent bar — sweeps left to right */
  .school-accent-bar {
    position: absolute; top: 0; left: 0;
    width: 0; border-radius: 20px 20px 0 0;
    pointer-events: none;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .school-accent-bar.revealed { width: 100%; }

  /* Outer glow ring */
  @keyframes schoolGlowPulse {
    0%   { opacity: 0; transform: scale(0.97); }
    30%  { opacity: 1; transform: scale(1.0); }
    100% { opacity: 0.6; transform: scale(1.0); }
  }
  .school-glow-ring {
    position: absolute; inset: -3px; border-radius: 23px;
    pointer-events: none; opacity: 0;
    animation: schoolGlowPulse 1.1s ease forwards;
  }

  /* Tier pill color shift */
  .tier-pill-school {
    transition: background 0.5s ease, color 0.5s ease, border-color 0.5s ease;
  }

  /* Coach name color shift */
  .coach-name-hero {
    transition: color 0.6s ease;
  }

  /* ─── Offer Board overlay ──────────────────────────────────────────────── */
  .board-overlay {
    position: fixed; inset: 0; z-index: 800;
    background: #0A0A0A; overflow-y: auto;
    animation: fadeIn 0.3s ease forwards;
  }
  .board-inner {
    max-width: 1400px; margin: 0 auto; padding: 28px 32px 40px;
  }
  .board-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .board-title {
    font-size: 28px; font-weight: 900; color: #C9A84C; letter-spacing: 3px;
  }
  .board-subtitle {
    font-size: 13px; color: #555; letter-spacing: 2px; margin-top: 2px;
  }
  .board-stats {
    font-size: 12px; color: #555; text-align: right;
  }
  .board-stats-val { color: #A8B2BB; font-weight: 700; }
  .btn-close-board {
    background: transparent; border: 1px solid #2A2A2A; color: #666;
    font-size: 13px; padding: 8px 20px; letter-spacing: 1px;
  }
  .board-tier-section { margin-bottom: 20px; }
  .board-tier-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid #1A1A1A;
  }
  .board-tier-badge {
    font-size: 12px; font-weight: 700; letter-spacing: 3px;
    padding: 3px 14px; border-radius: 3px;
  }
  .board-tier-count {
    font-size: 11px; color: #444;
  }
  .board-grid {
    display: grid; gap: 6px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }

  /* Individual school cell */
  .board-cell {
    position: relative; border-radius: 6px; padding: 10px 12px;
    background: #1A1A1A; border: 1px solid #222;
    transition: all 0.3s ease; overflow: hidden;
  }
  .board-cell-name {
    font-size: 13px; font-weight: 700; color: #F5F5F7;
    line-height: 1.2; position: relative; z-index: 1;
  }
  .board-cell-coach {
    font-size: 10px; color: #A8B2BB; margin-top: 3px;
    letter-spacing: 0.5px; position: relative; z-index: 1;
  }
  .board-cell-tier {
    font-size: 9px; color: #444; position: relative; z-index: 1;
  }

  /* Occupied — dimmed, no one can get this school */
  .board-cell.is-occupied {
    background: #111; border-color: #1A1A1A; opacity: 0.35;
  }

// ─── UTILITIES ───────────────────────────────────────────────────────────────

function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255;
}

function getTextColor(hex) {
  return luminance(hex) > 0.5 ? "#0A0A0A" : "#F5F5F7";
}

function getTierAccent(tier) {
  return { 1:"#C9A84C", 2:"#A8B2BB", 3:"#8B7355", 4:"#666666", 5:"#444444" }[tier] || "#444444";
}

function schoolAccentColor(school, tierFallback) {
  const sc = SCHOOL_COLORS[school];
  return sc ? (luminance(sc.p) >= luminance(sc.s) ? sc.p : sc.s) : getTierAccent(tierFallback);
}

// Given two hex colors, returns { bright, dark } — the brighter one always readable on #111
function schoolColorPair(hex1, hex2) {
  const l1 = luminance(hex1), l2 = luminance(hex2);
  let bright = l1 >= l2 ? hex1 : hex2;
  let dark = l1 >= l2 ? hex2 : hex1;
  // If even the "bright" color is too dim to glow visibly, lighten it
  if (luminance(bright) < 0.18) {
    const r = parseInt(bright.slice(1,3),16), g = parseInt(bright.slice(3,5),16), b = parseInt(bright.slice(5,7),16);
    const mix = (c) => Math.min(255, Math.round(c + (255-c) * 0.4));
    bright = `#${mix(r).toString(16).padStart(2,'0')}${mix(g).toString(16).padStart(2,'0')}${mix(b).toString(16).padStart(2,'0')}`;
  }
  return { bright, dark };
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/*
 * ─── SHOW STATE MACHINE (state.ss) ──────────────────────────────────────────
 *
 *   roundTransition ──[startRound()]──→ idle
 *   idle ──[doSpin()]──→ spinning
 *   spinning ──[runSlot() settles]──→ (waits AFTER_SPIN_DELAY) ──→ afterSpin()
 *     afterSpin() no conflict  → pendingConfirm  (injectNextButton)
 *     afterSpin() conflict     → tiebreaker-drama (runTiebreakerSlot)
 *   tiebreaker-drama ──[injectTiebreakerResult()]──→ conflict
 *   conflict ──[confirmTiebreaker()]──→ idle (via nextSpin)
 *   pendingConfirm ──[confirmAndAdvance()]──→ idle (via nextSpin)
 *   confirmed ──[nextSpin()]──→ idle | roundTransition
 *
 *   Special: if pool is empty, doSpin() skips straight to confirmed.
 *   Undo: any state → idle (via undoLast), bumps spinGen to invalidate
 *         all pending setTimeout callbacks from the aborted spin.
 */

// ─── STATE ───────────────────────────────────────────────────────────────────

let state = {
  phase: "setup", coaches: [], occupied: [], queue: [], qi: 0,
  assignments: {}, pools: {}, ss: "idle", slotPool: [], slotResult: null,
  slotTimer: null, conflict: null, undoSnapshot: null,
  spinGen: 0, // incremented each spin; stale callbacks check this to self-abort
  lastRevealedQi: -1, // tracks which qi had its card flip, prevents replay on re-render
  paused: false, showBoard: false,
  apiUrl: "https://script.google.com/macros/s/AKfycbyfO4OeT8OHyEXar-6qHB2Y3nYZl5ZVRdlBj70cxbUVc45NsW-lXMvWEjD3SqDuSHfIQw/exec",
  fetchStatus: "idle", fetchError: "",
  form: { name:"", tier:"3", prestige:"B", winPct:"", top25:"", error:"" }
};

// ─── STATE HELPERS ───────────────────────────────────────────────────────────

function currentRoundInfo() {
  const item = state.queue[state.qi];
  if (!item) return { tier:1, spinInRound:0, totalInRound:0 };
  const tier = item.tier;
  const roundSpins = state.queue.filter(s => s.tier === tier);
  const spinsBeforeThis = state.queue.slice(0, state.qi).filter(s => s.tier === tier).length;
  return { tier, spinInRound: spinsBeforeThis + 1, totalInRound: roundSpins.length };
}

function saveUndo() {
  state.undoSnapshot = {
    qi: state.qi,
    assignments: JSON.parse(JSON.stringify(state.assignments)),
    pools: JSON.parse(JSON.stringify(state.pools)),
    queue: JSON.parse(JSON.stringify(state.queue))
  };
}

function undoLast() {
  if (!state.undoSnapshot) return;
  if (state.slotTimer) { clearTimeout(state.slotTimer); state.slotTimer = null; }
  state.spinGen++; // invalidate any pending callbacks from the current spin
  AUDIO.undo();
  const flash = document.createElement("div");
  flash.className = "undone-flash";
  flash.textContent = "UNDONE";
  document.body.appendChild(flash);
  setTimeout(() => flash.style.opacity = "1", 20);
  setTimeout(() => { flash.style.opacity = "0"; setTimeout(() => flash.remove(), 300); }, 900);
  state.qi = state.undoSnapshot.qi;
  state.assignments = state.undoSnapshot.assignments;
  state.pools = state.undoSnapshot.pools;
  state.queue = state.undoSnapshot.queue;
  state.undoSnapshot = null;
  state.ss = "idle";
  state.conflict = null;
  state.slotPool = [];
  state.slotResult = null;
  render();
}

function breakTie(a, b) {
  const pA=PO.indexOf(a.prestige), pB=PO.indexOf(b.prestige);
  if (pA!==pB) return { winner:pA<pB?a:b, loser:pA<pB?b:a, reason:"Coach Prestige", detail:`${a.name} (${a.prestige}) vs ${b.name} (${b.prestige})` };
  if (a.winPct!==b.winPct) return { winner:a.winPct>b.winPct?a:b, loser:a.winPct>b.winPct?b:a, reason:"Win %", detail:`${a.name} (${(a.winPct*100).toFixed(1)}%) vs ${b.name} (${(b.winPct*100).toFixed(1)}%)` };
  if (a.top25wins!==b.top25wins) return { winner:a.top25wins>b.top25wins?a:b, loser:a.top25wins>b.top25wins?b:a, reason:"Top 25 Wins", detail:`${a.name} (${a.top25wins}) vs ${b.name} (${b.top25wins})` };
  const w=Math.random()<0.5?a:b;
  return { winner:w, loser:w===a?b:a, reason:"Coin Flip", detail:"Identical records — decided by random flip" };
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
const AUDIO = (() => {
  let ctx = null;
  let muted = false;

  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  function mute(on) { muted = on; }
  function isMuted() { return muted; }

  // Short percussive click — pitch varies inversely with slot speed
  function tick(speed) {
    if (muted) return;
    const ac = init();
    const now = ac.currentTime;
    const freq = Math.max(400, 1400 - speed * 3.2);
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(freq, now);
    osc.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.035);
    osc.start(now); osc.stop(now + 0.04);
  }

  // Low punch when the reel locks in
  function settle() {
    if (muted) return;
    const ac = init();
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(130, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.18);
    osc.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.5, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    osc.start(now); osc.stop(now + 0.25);
  }

  // Rising sawtooth sweep timed to the color animation, then tier fanfare
  function reveal(tier) {
    if (muted) return;
    const ac = init();
    const now = ac.currentTime;

    // Glissando sweep — starts at 350ms, matches color sweep animation
    const sweep = ac.createOscillator();
    const sweepFilter = ac.createBiquadFilter();
    const sweepGain = ac.createGain();
    sweepFilter.type = "lowpass";
    sweepFilter.frequency.value = 2400;
    sweep.type = "sawtooth";
    sweep.frequency.setValueAtTime(120, now + 0.35);
    sweep.frequency.exponentialRampToValueAtTime(880, now + 1.0);
    sweep.connect(sweepFilter); sweepFilter.connect(sweepGain); sweepGain.connect(ac.destination);
    sweepGain.gain.setValueAtTime(0, now + 0.35);
    sweepGain.gain.linearRampToValueAtTime(0.12, now + 0.55);
    sweepGain.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
    sweep.start(now + 0.35); sweep.stop(now + 1.15);

    // Tier fanfare — chord hits after the sweep settles
    const CHORDS = {
      1: [523.25, 659.25, 783.99, 1046.5], // C5 E5 G5 C6 — full major
      2: [523.25, 659.25, 783.99],          // C5 E5 G5 — triad
      3: [523.25, 659.25],                  // C5 E5 — open fifth
      4: [523.25],                           // C5 — single tone
      5: [440],                              // A4 — quiet ping
    };
    const VOLS  = { 1:0.20, 2:0.16, 3:0.12, 4:0.08, 5:0.05 };
    const DURS  = { 1:2.0,  2:1.6,  3:1.2,  4:0.8,  5:0.5  };
    const freqs = CHORDS[tier] || CHORDS[5];
    const vol   = VOLS[tier]   || 0.05;
    const dur   = DURS[tier]   || 0.5;
    const fanfareAt = now + 0.95;

    freqs.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.type = "sine"; osc.frequency.value = freq;
      osc.connect(g); g.connect(ac.destination);
      const t = fanfareAt + i * 0.055;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.07);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur + 0.1);
    });

    // Sub-bass bloom under T1/T2 for extra weight
    if (tier <= 2) {
      const sub = ac.createOscillator();
      const subG = ac.createGain();
      sub.type = "sine"; sub.frequency.value = 65;
      sub.connect(subG); subG.connect(ac.destination);
      const subVol = tier === 1 ? 0.28 : 0.18;
      subG.gain.setValueAtTime(0, fanfareAt);
      subG.gain.linearRampToValueAtTime(subVol, fanfareAt + 0.06);
      subG.gain.exponentialRampToValueAtTime(0.001, fanfareAt + 0.9);
      sub.start(fanfareAt); sub.stop(fanfareAt + 1.0);
    }
  }

  // Escalating drum roll for round transitions
  function roundStart() {
    if (muted) return;
    const ac = init();
    const now = ac.currentTime;
    const HITS = 7;
    for (let i = 0; i < HITS; i++) {
      const t = now + i * 0.07;
      const vol = 0.08 + (i / HITS) * 0.28;
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(28, t + 0.12);
      osc.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      osc.start(t); osc.stop(t + 0.18);
    }
  }

  // Descending two-note cue for undo
  function undo() {
    if (muted) return;
    const ac = init();
    const now = ac.currentTime;
    [740, 523].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = "sine"; osc.frequency.value = freq;
      osc.connect(g); g.connect(ac.destination);
      const t = now + i * 0.13;
      g.gain.setValueAtTime(0.14, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.start(t); osc.stop(t + 0.25);
    });
  }

  return { init, mute, isMuted, tick, settle, reveal, roundStart, undo };
})();


// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti(tier, primaryColor, secondaryColor, originEl) {
  // Remove any existing confetti canvases to prevent stacking
  document.querySelectorAll("[data-confetti]").forEach(c => c.remove());
  const COUNT = { 1:220, 2:160, 3:110, 4:65, 5:32 }[tier] || 32;
  const canvas = document.createElement("canvas");
  canvas.dataset.confetti = "1";
  canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999";
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx2d = canvas.getContext("2d");
  // Launch from the origin element's center if provided, otherwise screen center
  let cx = canvas.width / 2, cy = canvas.height / 2;
  if (originEl) {
    const rect = originEl.getBoundingClientRect();
    cx = rect.left + rect.width / 2;
    cy = rect.top + rect.height / 2;
  }
  const colors = [primaryColor, secondaryColor, "#F5F5F7"].filter(Boolean);
  const power = { 1:22, 2:18, 3:14, 4:10, 5:7 }[tier] || 7;
  const LIFETIME = { 1:420, 2:360, 3:300, 4:240, 5:180 }[tier] || 180;

  const particles = Array.from({ length: COUNT }, () => {
    const angle = Math.random() * Math.PI * 2;
    const speed = (Math.random() * 0.6 + 0.4) * power;
    return {
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (Math.random() * 3 + 2),
      w: Math.random() * 10 + 5,
      h: Math.random() * 5 + 3,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.08,
      color: colors[Math.floor(Math.random() * colors.length)],
      gravity: 0.018 + Math.random() * 0.012,
      drag: 0.97 + Math.random() * 0.02,
      sway: (Math.random() - 0.5) * 0.3,
      swaySpeed: 0.02 + Math.random() * 0.02,
      swayOffset: Math.random() * Math.PI * 2,
    };
  });

  let frame, tick = 0;
  function draw() {
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    tick++;
    let alive = false;
    for (const p of particles) {
      p.vy += p.gravity;
      p.vx *= p.drag;
      p.vy *= p.drag;
      p.x += p.vx + Math.sin(tick * p.swaySpeed + p.swayOffset) * p.sway;
      p.y += p.vy;
      p.rot += p.rotV;
      const opacity = Math.max(0, 1 - tick / LIFETIME);
      if (opacity > 0) alive = true;
      ctx2d.save();
      ctx2d.translate(p.x, p.y);
      ctx2d.rotate(p.rot);
      ctx2d.globalAlpha = opacity;
      ctx2d.fillStyle = p.color;
      ctx2d.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx2d.restore();
    }
    if (alive) frame = requestAnimationFrame(draw);
    else { cancelAnimationFrame(frame); canvas.remove(); }
  }
  frame = requestAnimationFrame(draw);
}

function renderDraftBoard() {
  // Build a reverse lookup: school → { coach, tier } for assigned schools
  const assignedMap = {};
  for (const [coach, tiers] of Object.entries(state.assignments)) {
    for (const [t, school] of Object.entries(tiers)) {
      // A school can be assigned multiple times (different coaches at different tiers)
      // Show the most recent / highest tier assignment
      if (!assignedMap[school] || parseInt(t) < assignedMap[school].tier) {
        assignedMap[school] = { coach, tier: parseInt(t) };
      }
    }
  }
  const occSet = new Set(state.occupied.map(s => s.toLowerCase()));
  const totalSchools = Object.values(SCHOOLS).flat().length;
  const assignedCount = Object.keys(assignedMap).length;
  const occupiedCount = state.occupied.length;
  const availableCount = totalSchools - assignedCount - occupiedCount;

  const tierSections = [1,2,3,4,5].map(t => {
    const tc = TC[t];
    const schools = SCHOOLS[t];
    const poolLeft = (state.pools[t] || []).length;
    const cells = schools.map(school => {
      const isOcc = occSet.has(school.toLowerCase());
      const assigned = assignedMap[school];
      const sc = SCHOOL_COLORS[school];
      if (isOcc) {
        return `<div class="board-cell is-occupied">
          <div class="board-cell-name">${esc(school)}</div>
          <div class="board-cell-tier">OCCUPIED</div>
        </div>`;
      }
      if (assigned) {
        const borderColor = sc ? (luminance(sc.p) >= luminance(sc.s) ? sc.p : sc.s) : getTierAccent(t);
        const washColor = sc ? sc.p : getTierAccent(t);
        return `<div class="board-cell is-assigned" style="border-color:${borderColor}">
          <div class="board-cell-color-wash" style="background:${washColor}"></div>
          <div class="board-cell-name">${esc(school)}</div>
          <div class="board-cell-coach">${esc(assigned.coach)}</div>
        </div>`;
      }
      return `<div class="board-cell is-available">
        <div class="board-cell-name">${esc(school)}</div>
      </div>`;
    }).join("");

    return `
      <div class="board-tier-section">
        <div class="board-tier-header">
          <div class="bc board-tier-badge" style="background:${TIER_BADGE[t].bg};color:${TIER_BADGE[t].text}">${tc.label}</div>
          <div class="board-tier-count">${schools.length} schools · ${poolLeft} available</div>
        </div>
        <div class="board-grid">${cells}</div>
      </div>`;
  }).join("");

  return `
    <div class="board-overlay">
      <div class="board-inner">
        <div class="board-header">
          <div>
            <div class="bc board-title">OFFER BOARD</div>
            <div class="bc board-subtitle">ALL ${totalSchools} PROGRAMS</div>
          </div>
          <div style="display:flex;align-items:center;gap:20px">
            <div class="board-stats">
              <span class="board-stats-val">${assignedCount}</span> offered ·
              <span class="board-stats-val">${occupiedCount}</span> occupied ·
              <span class="board-stats-val">${availableCount}</span> available
            </div>
            <button onclick="toggleBoard()" class="bc btn-close-board">CLOSE (B)</button>
          </div>
        </div>
        ${tierSections}
      </div>
    </div>`;
}

}

              <input id="c-top25" type="number" min="0" placeholder="Top 25 Wins" value="${state.form.top25}">
            </div>
            <button onclick="addCoach()" style="background:#C9A84C;color:#0A0A0A;padding:10px;font-size:14px;margin-top:2px">+ ADD COACH</button>
            ${state.form.error ? `<div class="form-error">${esc(state.form.error)}</div>` : ""}
          </div>
        </details>
        ${renderCoachList()}
      </div>

      <div class="setup-col-side">
        <div class="setup-section-header">
          <div class="bc setup-section-label" style="color:#A8B2BB">OCCUPIED</div>
          ${state.occupied.length>0?`<div class="setup-count">${state.occupied.length} schools</div>`:""}
        </div>
        <div style="background:#1A1A1A;border-radius:10px;padding:18px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px">
          <input id="occ-input" placeholder="School name" onkeydown="if(event.key==='Enter')addOcc()">
          <button onclick="addOcc()" style="background:#A8B2BB;color:#0A0A0A;padding:9px;font-size:13px">+ ADD</button>
        </div>
        <div class="setup-occ-hint">User-controlled schools — excluded from the wheel</div>
        <div class="scroll-list">${renderOccupiedList()}</div>
      </div>
    </div>

    ${state.coaches.length>0?`
      <div class="setup-start-area">
        <button onclick="startShow()" class="bc btn-start-show">START THE WHEEL OF FORTUNE</button>
      </div>`:""}
  </div>`;
}

function renderShow() {
  document.body.style.overflow = "hidden";
  const item = state.queue[state.qi];
  if (!item) { state.phase="results"; clearSavedShow(); return renderResults(); }
  const tc = TC[item.tier];
  const { tier, spinInRound, totalInRound } = currentRoundInfo();

  if (state.ss==="roundTransition") return renderTransitionPage(tier, tc);

  // Build center content based on show state
  let center = "";
  if (state.ss==="idle") {
    center = renderSpinButton(tc, state.qi===state.queue.length-1);
  }
  // spinning: slot-box is injected via DOM by doSpin() — no render needed
  if ((state.ss==="tiebreaker-drama"||state.ss==="conflict") && state.conflict) {
    center = renderTiebreakerPanel(item, state.conflict);
  }
  if (state.ss==="confirmed") {
    center = renderEmptyPoolCard(tc, state.qi===state.queue.length-1);
  }

  return `
    <div class="page-show">
      ${state.paused ? `
        <div class="pause-overlay" onclick="togglePause()">
          <div style="text-align:center">
            <div class="bc pause-label">PAUSED</div>
            <div class="pause-hint">press P or click to resume</div>
          </div>
        </div>` : ""}
      <div class="show-header">
        <div class="bc show-logo">CLOS // WHEEL OF FORTUNE</div>
        <div style="display:flex;align-items:center;gap:16px">
          <div class="bc show-tier-badge" style="background:${TIER_BADGE[item.tier].bg};color:${TIER_BADGE[item.tier].text}">${tc.label}</div>
          <div class="show-spin-count">Spin ${spinInRound} of ${totalInRound} this round &nbsp;·&nbsp; ${state.qi+1} of ${state.queue.length} overall</div>
          <button onclick="toggleBoard()" class="btn-pause" title="Offer Board (B)">▦</button>
          <button onclick="togglePause()" class="btn-pause" title="Pause (P)">⏸</button>
          <button onclick="toggleMute()" id="mute-btn" class="mute-btn" style="color:${AUDIO.isMuted()?'#555':'#A8B2BB'}" title="${AUDIO.isMuted()?'Unmute':'Mute'}">${AUDIO.isMuted()?'🔇':'🔊'}</button>
        </div>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-fill" style="width:${Math.round((state.qi/state.queue.length)*100)}%"></div>
      </div>

      <div class="show-body">
        <div class="show-main">
          ${renderShowCoachCard(item, tc)}
          ${center}
        </div>

        <div class="show-sidebar">
          <div class="sidebar-header">
            <div class="bc" style="font-size:16px;font-weight:700;color:#A8B2BB;letter-spacing:2px">OFFERS</div>
          </div>
          <div class="sidebar-list">
            ${renderNowSpinning(item, tc)}
            ${renderSidebar()}
          </div>
        </div>
      </div>
    </div>`;
}

function renderResults() {
  document.body.style.overflow = "auto";
  const cards = state.coaches.map((coach, i) => renderResultCard(coach, i)).join("");
  const cols = Math.min(state.coaches.length, 4);
  return `<div class="page-results">
    <div style="text-align:center;margin-bottom:36px;padding-top:8px">
      <div class="bc" style="font-size:48px;font-weight:900;color:#C9A84C;letter-spacing:3px">WHEEL OF FORTUNE</div>
      <div class="bc" style="font-size:24px;font-weight:700;color:#A8B2BB;letter-spacing:4px">FINAL RESULTS</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px">${cards}</div>
    <div style="text-align:center;margin-top:36px;padding-bottom:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button onclick="toggleBoard()" style="background:#0D1B2A;color:#A8B2BB;font-size:15px;padding:12px 32px;letter-spacing:2px;border:1px solid #2A2A2A" class="bc">OFFER BOARD</button>
      <button id="copy-results-btn" onclick="copyResults()" style="background:#C9A84C;color:#0A0A0A;font-size:15px;padding:12px 32px;letter-spacing:2px" class="bc">COPY RESULTS</button>
      <button onclick="resetAll()" style="background:#A8B2BB;color:#0A0A0A;font-size:15px;padding:12px 32px;letter-spacing:2px" class="bc">NEW SESSION</button>
    </div>
  </div>`;
}


// ─── ACTIONS ─────────────────────────────────────────────────────────────────

async function fetchData() {
  const url = state.apiUrl;
  if (!url) return;
  state.fetchStatus = "loading";
  render();
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.coaches || !Array.isArray(data.coaches)) throw new Error("Unexpected response: missing coaches array");
    if (!data.occupied || !Array.isArray(data.occupied)) throw new Error("Unexpected response: missing occupied array");
    // Validate each coach has required fields
    state.coaches = data.coaches.map(c => ({
      name: String(c.name || ""),
      tier: parseInt(c.tier) || 3,
      prestige: String(c.prestige || "C"),
      winPct: parseFloat(c.winPct) || 0,
      top25wins: parseInt(c.top25wins) || 0,
    })).filter(c => c.name);
    state.occupied = data.occupied.map(s => String(s)).filter(Boolean);
    state.fetchStatus = "success";
    state.form.error = "";
  } catch(err) {
    state.fetchError = err.message || "Failed to fetch. Check the URL and try again.";
    state.fetchStatus = "error";
  }
  render();
}

function addCoach() {
  const name = document.getElementById("c-name")?.value?.trim();
  if (!name) return;
  if (state.coaches.some(c => c.name.toLowerCase() === name.toLowerCase())) {
    state.form = { ...state.form, name, error: `"${name}" is already in the list.` };
    render(); return;
  }
  let winPct = parseFloat(document.getElementById("c-winpct").value) || 0;
  if (winPct > 100) {
    state.form = { ...state.form, name, error: "Win % must be between 0 and 1 (e.g. 0.68) or 0–100." };
    render(); return;
  }
  if (winPct > 1 && winPct <= 100) winPct = winPct / 100;
  winPct = Math.max(0, Math.min(1, winPct));
  state.coaches.push({ name, tier:+document.getElementById("c-tier").value, prestige:document.getElementById("c-prestige").value, winPct, top25wins:+document.getElementById("c-top25").value||0 });
  state.form = { name:"", tier:document.getElementById("c-tier").value, prestige:document.getElementById("c-prestige").value, winPct:"", top25:"", error:"" };
  render();
}

function removeCoach(i) { state.coaches.splice(i,1); render(); }

function addOcc() {
  const v = document.getElementById("occ-input")?.value?.trim();
  if (!v) return;
  if (state.occupied.some(s => s.toLowerCase() === v.toLowerCase())) return; // duplicate guard
  state.occupied.push(v);
  render();
}

function removeOcc(i) { state.occupied.splice(i,1); render(); }

function startShow() {
  state.queue = [];
  for (let offerTier=5; offerTier>=1; offerTier--) {
    const eligible = state.coaches.filter(c=>parseInt(c.tier)<=offerTier).sort((a,b)=>parseInt(b.tier)-parseInt(a.tier));
    eligible.forEach(c => state.queue.push({ coach:c, tier:offerTier, isReroll:false }));
  }
  const occSet = new Set(state.occupied.map(s=>s.toLowerCase()));
  state.pools = {};
  for (let t=1; t<=5; t++) state.pools[t] = SCHOOLS[t].filter(s=>!occSet.has(s.toLowerCase()));
  state.qi=0; state.assignments={}; state.ss="roundTransition";
  state.slotPool=[]; state.slotResult=null; state.conflict=null; state.undoSnapshot=null;
  state.spinGen=0; state.lastRevealedQi=-1; state.paused=false; state.showBoard=false;
  state.phase="show";
  render();
}

function startRound() { AUDIO.roundStart(); state.ss="idle"; render(); }

function doSpin() {
  AUDIO.init();
  const item = state.queue[state.qi];
  const pool = state.pools[item.tier]||[];
  if (!pool.length) { saveUndo(); state.ss="confirmed"; render(); return; }
  state.slotResult = pool[Math.floor(Math.random()*pool.length)];
  state.slotPool = [...pool];
  state.ss = "spinning";
  state.spinGen++;
  const gen = state.spinGen;

  const showMain = document.querySelector(".show-main");
  if (!showMain) { render(); runSlot(gen); return; }

  // Fade out spin button
  const spinBtn = showMain.lastElementChild;
  if (spinBtn) {
    spinBtn.style.transition = "opacity 0.25s ease";
    spinBtn.style.opacity = "0";
    setTimeout(() => { if (state.spinGen === gen) spinBtn.remove(); }, TIMING.BTN_FADE_MS);
  }

  // Compress card padding to make room for slot box
  const card = showMain.querySelector(".coach-card-static, .coach-card-reveal");
  if (card) {
    card.style.transition = "padding 0.45s ease";
    card.style.padding = "16px 40px";
  }
  showMain.style.transition = "gap 0.45s ease";
  showMain.style.gap = "16px";

  // Inject slot box with height animation
  const slotBox = document.createElement("div");
  slotBox.id = "slot-box";
  slotBox.className = "slot-box";
  slotBox.innerHTML = `<div id="slot-val" class="bc slot-val slot-spinning"></div>`;

  const wrapper = document.createElement("div");
  wrapper.className = "slot-wrapper";
  wrapper.appendChild(slotBox);
  showMain.appendChild(wrapper);

  setTimeout(() => {
    if (state.spinGen !== gen) return;
    wrapper.style.maxHeight = "320px";
    wrapper.style.opacity = "1";
    runSlot(gen);
  }, TIMING.SLOT_OPEN_DELAY);
}

function runSlot(gen) {
  let count = 0, speed = TIMING.SLOT_BASE_SPEED;
  const item = state.queue[state.qi];
  const tc = TC[item.tier];

  const tick = () => {
    if (state.spinGen !== gen) return; // abort if spin was invalidated
    count++;
    const el = document.getElementById("slot-val");
    const box = document.getElementById("slot-box");
    if (!el) return;

    if (count >= TIMING.SLOT_TICKS) {
      const sc = SCHOOL_COLORS[state.slotResult];
      const sbg = sc ? sc.p : tc.bg;
      const stxt = sc ? getTextColor(sc.p) : tc.text;
      const sborder = sc ? sc.s : tc.bg;
      el.textContent = state.slotResult;
      el.classList.remove("slot-spinning");
      el.classList.add("slot-settled");
      el.style.fontSize = "clamp(48px,7vw,96px)";
      el.style.color = "#F5F5F7";
      el.style.transform = "scale(1)";
      AUDIO.settle();
      AUDIO.reveal(item.tier);
      setTimeout(() => { if (state.spinGen === gen) launchConfetti(item.tier, sbg, sborder, document.getElementById("slot-box")); }, TIMING.CONFETTI_DELAY);
      // School takeover — color wave washes from slot box up into coach card
      const coachCard = document.querySelector(".coach-card");
      if (coachCard && sc) {
        const { bright, dark } = schoolColorPair(sc.p, sc.s);
        coachCard.classList.add("coach-card-accented");

        // Tier-scaled intensity: T1 = massive, T5 = subtle
        const tierScale = { 1:1.0, 2:0.8, 3:0.6, 4:0.4, 5:0.25 }[item.tier] || 0.25;
        const barHeight = Math.round(3 + tierScale * 5);          // 3–8px
        const tintAlpha = Math.round(tierScale * 30).toString(16).padStart(2,'0'); // 08–1e hex
        const glowSpread = Math.round(6 + tierScale * 18);        // 6–24
        const glowBlur = Math.round(20 + tierScale * 36);         // 20–56
        const ringSpread = Math.round(4 + tierScale * 10);        // 4–14
        const ringBlur = Math.round(16 + tierScale * 44);         // 16–60

        // Phase 1a (synced with color sweep): wave sweeps across the card
        setTimeout(() => {
          if (state.spinGen !== gen) return;

          // Color wave — sweeps left to right across the card
          const wave = document.createElement("div");
          wave.className = "school-wave";
          wave.style.background = `linear-gradient(to right, ${sc.p}${tintAlpha} 0%, ${dark}11 60%, transparent 100%)`;
          wave.style.backgroundSize = "200% 100%";
          wave.style.backgroundPosition = "100% 0";
          coachCard.appendChild(wave);
          requestAnimationFrame(() => wave.classList.add("sweep"));

          // Border shifts to school color
          coachCard.style.borderColor = bright;

          // Wave settles to lower opacity after sweeping — it did its job, back off
          setTimeout(() => {
            if (state.spinGen !== gen) return;
            wave.style.opacity = "0.4";
          }, 800);
        }, TIMING.COLOR_SWEEP_DELAY + 200);

        // Phase 1b (+150ms): accent bar follows the wave
        setTimeout(() => {
          if (state.spinGen !== gen) return;
          const bar = document.createElement("div");
          bar.className = "school-accent-bar";
          bar.style.height = barHeight + "px";
          bar.style.background = `linear-gradient(90deg, ${sc.p}, ${sc.s})`;
          coachCard.appendChild(bar);
          requestAnimationFrame(() => bar.classList.add("revealed"));
        }, TIMING.COLOR_SWEEP_DELAY + 350);

        // Phase 2: glow + pill + coach name — the "claimed" moment
        setTimeout(() => {
          if (state.spinGen !== gen) return;

          // Outer glow ring
          const ring = document.createElement("div");
          ring.className = "school-glow-ring";
          ring.style.boxShadow = `0 0 ${ringBlur}px ${ringSpread}px ${bright}55, 0 0 ${ringBlur*1.5}px ${ringSpread*2}px ${bright}18`;
          coachCard.appendChild(ring);

          // Card ambient glow
          coachCard.style.boxShadow = `0 0 ${glowBlur}px ${glowSpread}px ${bright}44, 0 0 ${Math.round(glowBlur*0.4)}px ${bright}22`;

          // Tier pill transforms to school colors
          const pill = coachCard.querySelector(".tier-pill");
          if (pill) {
            pill.classList.add("tier-pill-school");
            pill.style.background = sc.p;
            pill.style.color = getTextColor(sc.p);
            pill.style.border = `1px solid ${bright}66`;
          }

          // Coach name shifts to school accent color — the claiming moment
          const nameEl = coachCard.querySelector(".coach-name-hero");
          if (nameEl) nameEl.style.color = bright;
        }, TIMING.COLOR_SWEEP_DELAY + 700);
      }

      if (box) {
        box.style.transition = "none";
        box.style.background = `linear-gradient(to right, ${sbg} 50%, #1A1A1A 50%)`;
        box.style.backgroundSize = "200% 100%";
        box.style.backgroundPosition = "100% 0";

        // Inject countdown bar below slot
        const barColor = luminance(sbg) >= luminance(sborder) ? sbg : sborder;
        const countdown = document.createElement("div");
        countdown.id = "slot-countdown";
        countdown.className = "countdown-bar";
        countdown.innerHTML = `<div class="countdown-track"><div id="slot-countdown-fill" class="countdown-fill" style="background:${barColor}"></div></div>`;
        const slotWrapper = box.parentElement;
        (slotWrapper && slotWrapper !== document.querySelector(".show-main") ? slotWrapper : box).insertAdjacentElement("afterend", countdown);
        setTimeout(() => {
          if (state.spinGen !== gen) return;
          countdown.style.opacity = "1";
          const fill = document.getElementById("slot-countdown-fill");
          if (fill) fill.style.width = "100%";
        }, 400);

        setTimeout(() => {
          if (state.spinGen !== gen) return;
          box.style.transition = "background-position 0.65s cubic-bezier(0.4,0,0.2,1)";
          box.style.backgroundPosition = "0% 0";
          box.style.borderColor = sborder;
          box.style.borderWidth = "4px";
          setTimeout(() => {
            if (state.spinGen !== gen) return;
            el.style.transition = "color 0.3s ease";
            el.style.color = stxt;
          }, 350);
          setTimeout(() => {
            if (state.spinGen !== gen) return;
            el.style.transition = "transform 0.6s cubic-bezier(0.34,1.56,0.64,1)";
            el.style.transform = "scale(1.1)";
            setTimeout(() => {
              if (state.spinGen !== gen) return;
              el.style.transition = "transform 0.5s ease-out";
              el.style.transform = "scale(1)";
            }, 800);
          }, 700);
        }, TIMING.COLOR_SWEEP_DELAY);
      }
      setTimeout(() => { if (state.spinGen === gen) afterSpin(); }, TIMING.AFTER_SPIN_DELAY);
      return;
    }

    if (count > TIMING.SLOT_EASE_START) {
      const t = (count - TIMING.SLOT_EASE_START) / (TIMING.SLOT_TICKS - TIMING.SLOT_EASE_START);
      speed = Math.min(TIMING.SLOT_BASE_SPEED + Math.pow(t, TIMING.SLOT_EASE_POWER) * TIMING.SLOT_EASE_RANGE, TIMING.SLOT_MAX_SPEED);
    }
    if (count <= TIMING.SLOT_EASE_START ? count % 2 === 0 : true) AUDIO.tick(speed);
    el.textContent = state.slotPool[Math.floor(Math.random()*state.slotPool.length)];
    state.slotTimer = setTimeout(tick, speed);
  };
  state.slotTimer = setTimeout(tick, speed);
}

function afterSpin() {
  const item = state.queue[state.qi];
  const result = state.slotResult;
  let conflictName = null;
  for (const [n,ts] of Object.entries(state.assignments)) {
    if (n!==item.coach.name && ts[item.tier]===result) { conflictName=n; break; }
  }
  if (conflictName) {
    const other = state.coaches.find(c=>c.name===conflictName);
    state.conflict = { result, other, resolution:breakTie(item.coach,other) };
    state.ss = "tiebreaker-drama";
    render();
    runTiebreakerSlot();
  } else {
    injectNextButton();
  }
}

function runTiebreakerSlot() {
  const gen = state.spinGen;
  const item = state.queue[state.qi];
  const { resolution, other } = state.conflict;
  const winner = resolution.winner;
  const names = [item.coach.name, other.name];
  let count = 0, speed = TIMING.TB_BASE_SPEED;

  const tick = () => {
    if (state.spinGen !== gen) return;
    count++;
    const el = document.getElementById("tb-slot-val");
    const box = document.getElementById("tb-slot-box");
    if (!el) return;

    if (count >= TIMING.TB_TICKS) {
      el.textContent = winner.name;
      el.classList.remove("slot-spinning");
      el.classList.add("slot-settled");
      el.style.color = "#C9A84C";
      if (box) {
        box.style.transition = "border-color 0.3s ease, background 0.4s ease";
        box.style.borderColor = "#C9A84C";
        box.style.background = "#0D1B2A";
      }
      AUDIO.settle();
      setTimeout(() => { if (state.spinGen === gen) launchConfetti(3, "#C9A84C", "#A8B2BB"); }, TIMING.TB_CONFETTI_DELAY);
      setTimeout(() => { if (state.spinGen === gen) injectTiebreakerResult(); }, TIMING.TB_RESULT_DELAY);
      return;
    }

    if (count > TIMING.TB_EASE_START) {
      const t = (count - TIMING.TB_EASE_START) / (TIMING.TB_TICKS - TIMING.TB_EASE_START);
      speed = Math.min(TIMING.TB_BASE_SPEED + Math.pow(t, TIMING.SLOT_EASE_POWER) * TIMING.TB_EASE_RANGE, TIMING.TB_MAX_SPEED);
    }
    if (count % 2 === 0) AUDIO.tick(speed);
    el.textContent = names[count % 2];
    state.slotTimer = setTimeout(tick, speed);
  };
  state.slotTimer = setTimeout(tick, speed);
}

function injectTiebreakerResult() {
  const item = state.queue[state.qi];
  const { resolution, other } = state.conflict;
  const res = resolution;
  const rerollLoser  = res.winner.name===item.coach.name && item.tier===other.tier;
  const rerollCurrent = res.winner.name!==item.coach.name && item.tier===item.coach.tier;

  const div = document.createElement("div");
  div.className = "tb-injected-result";
  div.innerHTML = `
    <div class="tb-result-box">
      <div class="tb-reason">RESOLVED BY: ${esc(res.reason.toUpperCase())}</div>
      <div class="tb-detail">${esc(res.detail)}</div>
      <div class="bc tb-winner">${esc(res.winner.name).toUpperCase()} WINS</div>
      ${rerollLoser  ? `<div style="font-size:12px;color:#555;margin-top:6px">${esc(other.name)} receives a re-roll</div>` : ""}
      ${rerollCurrent ? `<div style="font-size:12px;color:#555;margin-top:6px">${esc(item.coach.name)} receives a re-roll</div>` : ""}
    </div>
    <button onclick="confirmTiebreaker()" class="bc btn-confirm-tb">CONFIRM & CONTINUE</button>
    <div class="spacebar-hint">press spacebar</div>`;

  const showMain = document.querySelector(".show-main");
  if (showMain) {
    showMain.appendChild(div);
    setTimeout(() => div.style.opacity = "1", 50);
  }
  state.ss = "conflict"; // re-enable spacebar confirm
}


function injectNextButton() {
  state.ss = "pendingConfirm";
  const isLast = state.qi === state.queue.length - 1;
  const btnDiv = document.createElement("div");
  btnDiv.id = "injected-next-btn";
  btnDiv.className = "injected-btn-wrap";
  const undoHtml = state.undoSnapshot
    ? `<button onclick="undoLast()" class="bc btn-undo">↩ UNDO</button>`
    : "";
  const nextLabel = isLast ? "SEE RESULTS" : "NEXT SPIN";
  const nextBg = isLast ? "#C9A84C" : "#F5F5F7";
  const nextHtml = `<button onclick="confirmAndAdvance()" class="bc btn-next" style="background:${nextBg};color:#0A0A0A">${nextLabel}</button>`;
  btnDiv.innerHTML = `<div class="btn-row">${undoHtml}${nextHtml}</div><div class="spacebar-hint">press spacebar</div>`;
  const showMain = document.querySelector(".show-main");
  if (showMain) {
    showMain.appendChild(btnDiv);
    setTimeout(() => btnDiv.style.opacity = "1", 50);
  }
  injectSidebarEntry();
}

function injectSidebarEntry() {
  const item = state.queue[state.qi];
  const result = state.slotResult;
  if (!result || !item) return;
  const accentColor = schoolAccentColor(result, item.tier);
  const sidebarList = document.querySelector(".sidebar-list");
  if (!sidebarList) return;
  const placeholder = sidebarList.querySelector(".no-assignments");
  if (placeholder) placeholder.remove();
  let tierGroup = sidebarList.querySelector(`[data-tier="${item.tier}"]`);
  if (!tierGroup) {
    tierGroup = document.createElement("div");
    tierGroup.dataset.tier = String(item.tier);
    tierGroup.style.marginBottom = "12px";
    tierGroup.innerHTML = `<div class="sidebar-tier-label">${TC[item.tier].label}</div>`;
    const existingGroups = Array.from(sidebarList.querySelectorAll("[data-tier]"));
    let inserted = false;
    for (const g of existingGroups) {
      if (parseInt(g.dataset.tier) < item.tier) {
        sidebarList.insertBefore(tierGroup, g);
        inserted = true;
        break;
      }
    }
    if (!inserted) sidebarList.appendChild(tierGroup);
  }
  const entry = document.createElement("div");
  entry.className = "sidebar-entry";
  entry.style.cssText = `border-left:3px solid ${accentColor};transform:translateY(24px);opacity:0;transition:transform 0.5s cubic-bezier(0.34,1.2,0.64,1),opacity 0.4s ease`;
  entry.innerHTML = `<div class="sidebar-entry-name">${esc(item.coach.name)}</div><div class="sidebar-entry-school">${esc(result)}</div>`;
  tierGroup.appendChild(entry);
  setTimeout(() => { entry.style.transform = "translateY(0)"; entry.style.opacity = "1"; }, 50);
  setTimeout(() => sidebarList.scrollTo({ top: sidebarList.scrollHeight, behavior: "smooth" }), 100);
}

function confirmAndAdvance() {
  doConfirm(state.slotResult);
  const isLast = state.qi === state.queue.length - 1;
  if (isLast) { state.phase = "results"; render(); }
  else { nextSpin(); }
}

function doConfirm(result) {
  saveUndo();
  const item = state.queue[state.qi];
  if (!state.assignments[item.coach.name]) state.assignments[item.coach.name]={};
  state.assignments[item.coach.name][item.tier]=result;
  state.pools[item.tier]=state.pools[item.tier].filter(s=>s!==result);
  state.conflict=null;
  state.ss="confirmed";
  saveShowState();
}

function confirmTiebreaker() {
  const item = state.queue[state.qi];
  const { result, other, resolution } = state.conflict;
  const winner=resolution.winner, loser=resolution.loser;
  if (winner.name===item.coach.name) {
    // Current spinner wins — they get the school
    if (item.tier===loser.tier) state.queue.splice(state.qi+1,0,{coach:loser,tier:item.tier,isReroll:true});
    doConfirm(result);
    nextSpin();
  } else {
    // Other coach wins — assign school to the winner, current spinner may re-roll
    const reroll = item.tier===item.coach.tier;
    if (reroll) state.queue.splice(state.qi+1,0,{coach:item.coach,tier:item.tier,isReroll:true});
    saveUndo();
    // Assign the school to the tiebreaker winner
    if (!state.assignments[winner.name]) state.assignments[winner.name]={};
    state.assignments[winner.name][item.tier]=result;
    state.pools[item.tier]=state.pools[item.tier].filter(s=>s!==result);
    state.conflict=null;
    saveShowState();
    nextSpin();
  }
}

function nextSpin() {
  state.ss="idle"; state.slotPool=[]; state.slotResult=null; state.conflict=null;
  const prevTier = state.queue[state.qi]?.tier;
  state.qi++;
  if (state.qi>=state.queue.length) { state.phase="results"; render(); return; }
  const nextTier = state.queue[state.qi]?.tier;
  if (nextTier!==prevTier) state.ss="roundTransition";
  render();
  // Pulse the progress bar on each advance
  const bar = document.getElementById("progress-bar");
  if (bar) {
    bar.classList.remove("progress-fill-pulse");
    void bar.offsetWidth; // force reflow to restart animation
    bar.classList.add("progress-fill-pulse");
  }
}

function togglePause() {
  if (state.phase !== "show") return;
  if (state.showBoard) return; // close board first
  state.paused = !state.paused;
  render();
}

function toggleBoard() {
  if (state.phase !== "show" && state.phase !== "results") return;
  state.showBoard = !state.showBoard;
  if (state.showBoard) {
    // Inject the board overlay without re-rendering the whole show (preserves animations)
    const existing = document.querySelector(".board-overlay");
    if (existing) { existing.remove(); state.showBoard = false; return; }
    document.getElementById("app").insertAdjacentHTML("beforeend", renderDraftBoard());
  } else {
    const overlay = document.querySelector(".board-overlay");
    if (overlay) overlay.remove();
  }
}

function copyResults() {
  const lines = ["CLOS // WHEEL OF FORTUNE — RESULTS", ""];
  state.coaches.forEach(coach => {
    const ca = state.assignments[coach.name] || {};
    const topOffer = ca[coach.tier];
    let line = `${coach.name} (T${coach.tier} · ${coach.prestige})`;
    if (topOffer) line += ` → ${topOffer}`;
    else line += ` → No offer`;
    const otherTiers = [1,2,3,4,5].filter(t => t >= coach.tier && t !== coach.tier);
    const extras = otherTiers.map(t => ca[t] ? `T${t}: ${ca[t]}` : null).filter(Boolean);
    if (extras.length) line += `  [${extras.join(", ")}]`;
    lines.push(line);
  });
  navigator.clipboard.writeText(lines.join("\n")).then(() => {
    const btn = document.getElementById("copy-results-btn");
    if (btn) { btn.textContent = "COPIED ✓"; setTimeout(() => btn.textContent = "COPY RESULTS", 2000); }
  });
}

function toggleMute() {
  AUDIO.mute(!AUDIO.isMuted());
  const btn = document.getElementById("mute-btn");
  if (btn) {
    btn.textContent = AUDIO.isMuted() ? "🔇" : "🔊";
    btn.style.color  = AUDIO.isMuted() ? "#555" : "#A8B2BB";
    btn.title        = AUDIO.isMuted() ? "Unmute" : "Mute";
  }
}

// ─── LOCAL STORAGE CRASH RECOVERY ────────────────────────────────────────────
const STORAGE_KEY = "clos_wof_session";

function saveShowState() {
  try {
    const snap = {
      coaches: state.coaches, occupied: state.occupied,
      queue: state.queue, qi: state.qi,
      assignments: state.assignments, pools: state.pools,
      savedAt: Date.now(),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snap));
  } catch(e) { /* quota or private browsing — silently skip */ }
}

function loadSavedShow() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const snap = JSON.parse(raw);
    if (!snap.coaches || !snap.queue || !snap.assignments) return null;
    // Expire after 6 hours
    if (Date.now() - snap.savedAt > 6 * 60 * 60 * 1000) { clearSavedShow(); return null; }
    return snap;
  } catch(e) { return null; }
}

function resumeSavedShow(snap) {
  state.coaches = snap.coaches;
  state.occupied = snap.occupied;
  state.queue = snap.queue;
  state.qi = snap.qi;
  state.assignments = snap.assignments;
  state.pools = snap.pools;
  state.ss = "idle";
  state.phase = "show";
  state.spinGen = 0;
  state.lastRevealedQi = -1;
  state.paused = false;
  state.slotPool = [];
  state.slotResult = null;
  state.conflict = null;
  state.undoSnapshot = null;
  clearSavedShow();
  render();
}

function clearSavedShow() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function dismissRecovery() {
  clearSavedShow();
  render();
}

function resetAll() {
  clearSavedShow();
  state = { phase:"setup", coaches:[], occupied:[], queue:[], qi:0, assignments:{}, pools:{},
    ss:"idle", slotPool:[], slotResult:null, slotTimer:null, conflict:null, undoSnapshot:null,
    spinGen:0, lastRevealedQi:-1, paused:false, showBoard:false, apiUrl:state.apiUrl, fetchStatus:"idle", fetchError:"",
    form:{name:"",tier:"3",prestige:"B",winPct:"",top25:"",error:""} };
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
if (state.apiUrl) fetchData();

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (state.phase !== "show") return;

  // Pause toggle — P key (works even when paused)
  if (e.code === "KeyP") { e.preventDefault(); togglePause(); return; }

  // Offer board toggle — B key (works even when paused)
  if (e.code === "KeyB") { e.preventDefault(); toggleBoard(); return; }

  // Block all other show keys while paused or board is open
  if (state.paused || state.showBoard) return;

  // Undo — U key or Ctrl+Z / Cmd+Z
  if (e.code === "KeyU" || ((e.ctrlKey || e.metaKey) && e.code === "KeyZ")) {
    e.preventDefault();
    if (state.undoSnapshot && state.ss !== "spinning" && state.ss !== "tiebreaker-drama") undoLast();
    return;
  }

  // Spacebar — primary show control
  if (e.code !== "Space") return;
  e.preventDefault();
  AUDIO.init();
  if (state.ss === "roundTransition") { startRound(); return; }
  if (state.ss === "idle") { doSpin(); return; }
  if (state.ss === "tiebreaker-drama") return; // wait for drama to finish
  if (state.ss === "conflict") { confirmTiebreaker(); return; }
  if (state.ss === "pendingConfirm") { confirmAndAdvance(); return; }
  if (state.ss === "confirmed") { nextSpin(); return; }
});

// ─── TEST HELPER — call window.testTiebreaker() in browser console ──────────
window.testTiebreaker = function() {
  if (state.phase !== "show") { console.warn("Start the show first"); return; }
  const item = state.queue[state.qi];
  if (!item) { console.warn("No current spin"); return; }
  const fakeOther = { name:"Test Coach", tier:item.tier, prestige:"B", winPct:0.5, top25wins:0 };
  state.conflict = {
    result: state.slotResult || "Alabama",
    other: fakeOther,
    resolution: { winner: item.coach, loser: fakeOther, reason:"Coin Flip", detail:"Forced via test helper" }
  };
  state.ss = "tiebreaker-drama";
  render();
  runTiebreakerSlot();
  console.log("Tiebreaker drama triggered — winner:", item.coach.name);
};

// ─── UNLOAD GUARD — warn before losing a live session ────────────────────────
window.addEventListener("beforeunload", e => {
  if (state.phase === "show") {
    e.preventDefault();
    e.returnValue = "";
  }
});
</script>
